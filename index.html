<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cifrador Maestro - César & Atbash</title>
    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #888;
        }

        textarea, input, select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0099cc;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            word-wrap: break-word;
            min-height: 40px;
        }

        #resultado {
            font-family: 'Courier New', monospace;
            color: var(--primary);
            font-size: 1.2rem;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1> Cifrado </h1>

    <div class="input-group">
        <label>Mensaje:</label>
        <textarea id="texto" placeholder="Escribe tu mensaje"></textarea>
    </div>

    <div class="input-group">
        <label>Alfabeto (Charset):</label>
        <input type="text" id="charset" value="ABCDEFGHIJKLMNOPQRSTUVWXYZ">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="input-group" style="flex: 2;">
            <label>Método:</label>
            <select id="metodo">
                <option value="cesar">César</option>
                <option value="atbash">Atbash</option>
            </select>
        </div>
        <div class="input-group" style="flex: 1;">
            <label>Despl.:</label>
            <input type="number" id="desplazamiento" value="3">
        </div>
    </div>

    <div class="input-group">
        <label>Acción:</label>
        <select id="modo">
            <option value="cifrar">Cifrar Mensaje</option>
            <option value="descifrar">Descifrar Mensaje</option>
        </select>
    </div>

    <button onclick="procesar()">EJECUTAR OPERACIÓN</button>

    <div class="result-box">
        <label>Resultado:</label>
        <p id="resultado">Esperando datos...</p>
    </div>
</div>

<script>
    function cifrarCesar(texto, desplazamiento, charset, modo) {
        let resultado = "";
        let n = charset.length;
        if (modo === "descifrar") desplazamiento = -desplazamiento;

        for (let i = 0; i < texto.length; i++) {
            let char = texto[i];
            let index = charset.indexOf(char);
            if (index !== -1) {
                let nuevoIndex = (index + desplazamiento + n) % n;
                resultado += charset[nuevoIndex];
            } else {
                resultado += char;
            }
        }
        return resultado;
    }

    function cifrarAtbash(texto, charset) {
        let resultado = "";
        let n = charset.length;
        for (let i = 0; i < texto.length; i++) {
            let char = texto[i];
            let index = charset.indexOf(char);
            if (index !== -1) {
                let nuevoIndex = n - 1 - index;
                resultado += charset[nuevoIndex];
            } else {
                resultado += char;
            }
        }
        return resultado;
    }

    function procesar() {
        let texto = document.getElementById("texto").value.toUpperCase();
        let charset = document.getElementById("charset").value.toUpperCase();
        let metodo = document.getElementById("metodo").value;
        let desplazamiento = parseInt(document.getElementById("desplazamiento").value);
        let modo = document.getElementById("modo").value;
        let resultado = "";

        if (metodo === "cesar") {
            resultado = cifrarCesar(texto, desplazamiento, charset, modo);
        } else {
            resultado = cifrarAtbash(texto, charset);
        }

        document.getElementById("resultado").innerText = resultado || "Sin entrada";
    }
</script>

</body>
</html>
